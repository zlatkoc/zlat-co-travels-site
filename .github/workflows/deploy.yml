name: Deploy

# Builds the static site and publishes to S3 + CloudFront.
# NOT active until the AWS resources + repo config below exist (see README).
#
# Required GitHub repo settings (Settings → Secrets and variables → Actions):
#   Variables:  AWS_REGION, AWS_ROLE_ARN, S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID
# Auth is OIDC → an IAM role (no long-lived keys).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write # OIDC
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Credentials before the build: trip photos are gitignored and live in
      # s3://<bucket>/media-src/ — the build needs them pulled into _media/ first.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Pull trip photos (media-src/)
        run: S3_BUCKET="${{ vars.S3_BUCKET }}" scripts/sync-photos.sh pull

      - run: npm run build

      # Hashed assets in /_astro are immutable → cache hard. HTML → revalidate.
      # `media/*` (videos, publish-media.sh) and `media-src/*` (photo sources,
      # sync-photos.sh) are published separately — never let the site deploy
      # delete them.
      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync dist/ "s3://${{ vars.S3_BUCKET }}" \
            --delete \
            --exclude "*.html" \
            --exclude "media/*" \
            --exclude "media-src/*" \
            --exclude "preview-*" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Sync HTML (no long cache)
        run: |
          aws s3 sync dist/ "s3://${{ vars.S3_BUCKET }}" \
            --delete \
            --exclude "*" --include "*.html" \
            --exclude "media/*" \
            --exclude "media-src/*" \
            --exclude "preview-*" \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
